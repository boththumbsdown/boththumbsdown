<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DIDACTIC</title>

<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
  }

  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  #didactic {
    position: absolute;
    top: 50%;
    left: 50%;
    display: block;
    width: auto;
    height: auto;
    max-width: 90vw;
    max-height: 90vh;
    transform-origin: center center;
    will-change: transform;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="stage">
    <img id="didactic" src="DIDACTIC.png" alt="DIDACTIC" />
  </div>

<script>
  const img = document.getElementById("didactic");

  function animate(t) {
    const time = t * 0.001;

    const moveX =
      Math.sin(time * 0.23) * Math.min(window.innerWidth * 0.025, 28) +
      Math.sin(time * 0.11 + 1.7) * Math.min(window.innerWidth * 0.012, 14);

    const moveY =
      Math.sin(time * 0.19 + 0.8) * Math.min(window.innerHeight * 0.03, 32) +
      Math.sin(time * 0.07 + 2.4) * Math.min(window.innerHeight * 0.015, 16);

    const rotate =
      Math.sin(time * 0.09 + 0.5) * 4 +
      Math.sin(time * 0.05 + 2.1) * 2;

    img.style.transform = `
      translate(-50%, -50%)
      translate(${moveX}px, ${moveY}px)
      rotate(${rotate}deg)
    `;

    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
</script>
</body>
</html>
